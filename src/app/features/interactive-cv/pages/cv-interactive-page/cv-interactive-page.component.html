<div class="cv-page" aria-label="Currículum interactivo">
  <div class="background-layer" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
    <span class="blob blob-c"></span>
    <span class="grid-shade"></span>
  </div>

  <section id="hero" class="hero-stage">
    <div class="topbar-shell" [class.is-compact]="isStickyCompact()">
      <header class="premium-topbar" aria-label="Cabecera premium flotante del perfil profesional">
        <a class="brand-capsule" href="#hero" aria-label="Volver al perfil principal">
          <span class="brand-mark">JP</span>
          <span class="brand-copy">
            <strong>Javier Prados</strong>
            <small>Angular Developer</small>
          </span>
        </a>

        <nav class="floating-nav" aria-label="Navegación por secciones">
          <a
            *ngFor="let item of navItems"
            [attr.href]="'#' + item.id"
            [class.active]="activeSection() === item.id"
            [attr.data-optional]="item.optionalOnMobile ? 'true' : null"
          >
            {{ item.label }}
          </a>
        </nav>

        <div class="topbar-cta" aria-label="Acciones rápidas">
          <a class="ghost-btn" href="#contact">Contactar</a>
          <button type="button" class="solid-btn" (click)="downloadCv()">Descargar CV</button>
          <a class="icon-btn" href="https://github.com" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <span aria-hidden="true">◢</span>
            GitHub
          </a>
        </div>
      </header>
    </div>

    <app-cv-hero
      [name]="cvData.name"
      [role]="cvData.mainRole"
      [summary]="cvData.professionalSummary"
      [contact]="cvData.contact"
      [profile]="cvData"
    />
  </section>

  <section class="cv-composition" aria-label="Contenido principal del currículum">
    <main class="stage-main" id="experience">
      <app-section-card kicker="Historial" title="Experiencia y contribución técnica" class="panel panel-experience">
        <app-interactive-experience-list
          [experiences]="filteredExperiences()"
          [selectedIndex]="selectedExperienceIndex()"
          (selectedIndexChange)="onExperienceSelected($event)"
        />
      </app-section-card>
    </main>

    <aside class="stage-side" aria-label="Información profesional complementaria">
      <app-section-card [compact]="true" title="Stack y herramientas" id="toolkit" class="panel panel-skills">
        <app-skills-filter
          [skills]="cvData.technicalSkills"
          [skillGroups]="skillGroups"
          [selectedSkill]="selectedSkill()"
          (skillSelected)="onSkillSelected($event)"
        />
      </app-section-card>

      <app-section-card [compact]="true" title="Formación académica" id="learning" class="panel panel-education">
        <ul class="info-list educational-list">
          <li *ngFor="let item of cvData.education">
            <div class="item-row">
              <strong>{{ item.degree }}</strong>
              <span class="meta">{{ item.date }}</span>
            </div>
            <span class="detail">{{ item.institution }}</span>
          </li>
        </ul>
      </app-section-card>

      <app-section-card [compact]="true" title="Idiomas" class="panel panel-languages">
        <ul class="tags-list">
          <li *ngFor="let language of cvData.languages">{{ language }}</li>
        </ul>
      </app-section-card>

      <app-section-card [compact]="true" title="Cursos y otros datos" class="panel panel-courses">
        <ul class="info-list course-list">
          <li *ngFor="let course of cvData.courses">
            <div class="item-row">
              <strong>{{ course.title }}</strong>
              <span class="meta" *ngIf="course.hours">{{ course.hours }}</span>
            </div>
            <span class="detail">{{ course.provider }}</span>
          </li>
          <li class="plain-detail" *ngFor="let detail of cvData.otherDetails">{{ detail }}</li>
        </ul>
      </app-section-card>
    </aside>
  </section>
</div>
