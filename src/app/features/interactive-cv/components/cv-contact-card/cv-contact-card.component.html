<article class="contact-card" aria-label="Datos personales y de contacto">
  <h2>Información personal</h2>

  <ul>
    <li>
      <mat-icon aria-hidden="true">mail</mat-icon>
      <div>
        <span class="label">Email</span>
        <strong><a [href]="'mailto:' + contact.email">{{ contact.email }}</a></strong>
      </div>
    </li>
    <li>
      <mat-icon aria-hidden="true">phone</mat-icon>
      <div>
        <span class="label">Teléfono</span>
        <strong><a [href]="'tel:' + contact.mobilePhone.replaceAll(' ', '')">{{ contact.mobilePhone }}</a></strong>
      </div>
    </li>
    <li>
      <mat-icon aria-hidden="true">location_on</mat-icon>
      <div><span class="label">Ubicación</span><strong>{{ contact.address }}</strong></div>
    </li>
    <li>
      <mat-icon aria-hidden="true">public</mat-icon>
      <div><span class="label">Nacionalidad</span><strong>{{ contact.nationality }}</strong></div>
    </li>
    <li>
      <mat-icon aria-hidden="true">calendar_today</mat-icon>
      <div><span class="label">Fecha de nacimiento</span><strong>{{ contact.birthDate }}</strong></div>
    </li>
  </ul>

  <div class="actions" aria-label="Acciones principales" *ngIf="!isPrintMode">
    <a class="action-button" [href]="'mailto:' + contact.email">Contacto</a>
    <a class="action-button" [href]="githubUrl" target="_blank" rel="noopener noreferrer">GitHub</a>
    <button class="action-button action-button-primary" type="button" (click)="requestPrint($event)">Descargar CV</button>
  </div>
</article>
