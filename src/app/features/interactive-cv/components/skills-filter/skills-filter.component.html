<section aria-labelledby="skills-title">
  <h2 id="skills-title">Competencias técnicas</h2>

  <mat-chip-set>
    <mat-chip-option [selected]="selectedSkill === null" (selectionChange)="selectSkill(null)">
      Todas
    </mat-chip-option>
    <mat-chip-option
      *ngFor="let skill of skills"
      [selected]="selectedSkill === skill"
      (selectionChange)="selectSkill(skill)"
    >
      {{ skill }}
    </mat-chip-option>
  </mat-chip-set>
</section>
