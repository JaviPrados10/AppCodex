<section class="skills-wrap" aria-labelledby="skills-title">
  <header class="section-header">
    <p class="kicker">Capacidades</p>
    <h2 id="skills-title">Skills técnicas</h2>
    <p class="intro">Selecciona una competencia para filtrar experiencia o explora el stack por bloques funcionales.</p>
  </header>

  <button class="all-button" type="button" [class.is-selected]="selectedSkill === null" (click)="selectSkill(null)">
    Ver todo el historial
  </button>

  <div class="groups" *ngIf="skillGroups.length; else flatSkills">
    <section class="skill-group" *ngFor="let group of skillGroups">
      <h3>{{ group.title }}</h3>
      <div class="chips" role="list" aria-label="Grupo de competencias">
        <button
          class="chip"
          type="button"
          role="listitem"
          *ngFor="let skill of group.skills"
          [class.is-selected]="selectedSkill === skill"
          (click)="selectSkill(skill)"
        >
          {{ skill }}
        </button>
      </div>
    </section>
  </div>

  <ng-template #flatSkills>
    <div class="chips" role="list" aria-label="Filtro de competencias">
      <button
        class="chip"
        type="button"
        role="listitem"
        *ngFor="let skill of skills"
        [class.is-selected]="selectedSkill === skill"
        (click)="selectSkill(skill)"
      >
        {{ skill }}
      </button>
    </div>
  </ng-template>
</section>
