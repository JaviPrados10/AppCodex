<section class="skills-wrap" aria-labelledby="skills-title">
  <header class="section-header">
    <p class="kicker">Stack tecnológico</p>
    <h2 id="skills-title">Competencias técnicas</h2>
  </header>

  <mat-chip-set class="all-filter" aria-label="Filtro principal de competencias">
    <mat-chip-option class="skill-chip all-chip" [selected]="selectedSkill === null" (selectionChange)="selectSkill(null)">
      Todas las competencias
    </mat-chip-option>
  </mat-chip-set>

  <div class="groups" *ngIf="skillGroups.length; else flatSkills">
    <section class="skill-group" *ngFor="let group of skillGroups">
      <h3>{{ group.title }}</h3>
      <mat-chip-set aria-label="Grupo de competencias">
        <mat-chip-option
          class="skill-chip"
          *ngFor="let skill of group.skills"
          [selected]="selectedSkill === skill"
          (selectionChange)="selectSkill(skill)"
        >
          {{ skill }}
        </mat-chip-option>
      </mat-chip-set>
    </section>
  </div>

  <ng-template #flatSkills>
    <mat-chip-set aria-label="Filtro de competencias">
      <mat-chip-option
        class="skill-chip"
        *ngFor="let skill of skills"
        [selected]="selectedSkill === skill"
        (selectionChange)="selectSkill(skill)"
      >
        {{ skill }}
      </mat-chip-option>
    </mat-chip-set>
  </ng-template>
</section>
