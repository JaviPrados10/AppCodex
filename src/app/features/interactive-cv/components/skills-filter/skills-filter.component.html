<section class="skills-wrap" aria-labelledby="skills-title">
  <header class="section-header">
    <p class="kicker">Stack tecnológico</p>
    <h2 id="skills-title">Competencias técnicas</h2>
  </header>

  <mat-chip-set aria-label="Filtro de competencias">
    <mat-chip-option class="skill-chip" [selected]="selectedSkill === null" (selectionChange)="selectSkill(null)">
      Todas
    </mat-chip-option>
    <mat-chip-option
      class="skill-chip"
      *ngFor="let skill of skills"
      [selected]="selectedSkill === skill"
      (selectionChange)="selectSkill(skill)"
    >
      {{ skill }}
    </mat-chip-option>
  </mat-chip-set>
</section>
