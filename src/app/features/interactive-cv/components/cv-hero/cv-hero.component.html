<section class="hero" aria-label="Executive profile header">
  <span class="hero-light"></span>

  <div class="hero-grid">
    <article class="hero-primary">
      <p class="eyebrow">Perfil profesional · CV</p>
      <h2>{{ name }}</h2>
      <p class="role">{{ role }}</p>
      <p class="summary">{{ summary }}</p>

      <div class="badges" aria-label="Valor profesional">
        <span>Angular Enterprise</span>
        <span>Arquitectura Frontend</span>
        <span>Colaboración técnica</span>
      </div>
    </article>

    <aside class="hero-secondary" id="contact">
      <app-cv-contact-card [contact]="contact" [profile]="profile" />
      <p class="availability">Disponible para proyectos Angular en entornos enterprise</p>
    </aside>
  </div>
</section>
