<div class="topbar-shell" [class.is-compact]="isStickyCompact()">
  <header class="premium-topbar" aria-label="Cabecera premium flotante del perfil profesional">
    <div class="topbar-main-row">
      <a class="brand-block" href="#hero" aria-label="Volver al perfil principal" (click)="onNavClick($event, 'hero')">
        <span class="brand-mark">JP</span>
        <span class="brand-copy">
          <strong>{{ brandName }}</strong>
          <small>{{ brandRole }}</small>
        </span>
      </a>

      <div class="topbar-cta" aria-label="Acciones rápidas">
        <a class="subtle-btn" href="#contact" (click)="onContactClick($event)">Contactar</a>
        <a class="primary-btn" [href]="cvDownloadUrl" download="Javier-Prados-CV.pdf">Descargar CV</a>
      </div>
    </div>

    <nav class="floating-nav" aria-label="Navegación por secciones">
      <a
        *ngFor="let item of navItems"
        [attr.href]="'#' + item.id"
        [class.active]="activeSection() === item.id"
        [attr.data-optional]="item.optionalOnMobile ? 'true' : null"
        (click)="onNavClick($event, item.id)"
      >
        {{ item.label }}
      </a>
    </nav>
  </header>
</div>
<div class="topbar-spacer" aria-hidden="true"></div>
