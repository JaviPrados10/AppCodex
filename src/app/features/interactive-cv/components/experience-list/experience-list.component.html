<section class="experience-wrap" aria-labelledby="experience-title">
  <header class="section-header">
    <p class="kicker">Trayectoria principal</p>
    <h2 id="experience-title">Experiencia profesional</h2>
    <p class="supporting">Recorrido técnico en proyectos corporativos, evolución de responsabilidad y stack aplicado.</p>
  </header>

  <div class="timeline" role="list" aria-label="Línea temporal profesional">
    <article
      class="career-item"
      role="listitem"
      *ngFor="let experience of experiences; let i = index; trackBy: trackByExperience"
      [class.is-active]="selectedIndex === i"
      (click)="select(i)"
      (keyup.enter)="select(i)"
      tabindex="0"
    >
      <aside class="date-column">
        <span class="date-label">{{ experience.dateRange }}</span>
      </aside>

      <div class="content-column">
        <header class="item-header">
          <h3>{{ experience.role }}</h3>
          <p class="company">{{ experience.company }}</p>
        </header>

        <ul class="responsibilities">
          <li *ngFor="let responsibility of experience.responsibilities">{{ responsibility }}</li>
        </ul>

        <div class="stack" aria-label="Tecnologías destacadas">
          <span class="stack-chip" *ngFor="let stack of experience.stackHighlights">{{ stack }}</span>
        </div>
      </div>
    </article>
  </div>
</section>
