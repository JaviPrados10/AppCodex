<section class="experience-wrap" aria-labelledby="experience-title">
  <header class="section-header">
    <p class="kicker">Trayectoria</p>
    <h2 id="experience-title">Experiencia profesional</h2>
    <p class="supporting">Timeline de proyectos con foco en frontend enterprise, integración backend y liderazgo técnico.</p>
  </header>

  <div class="timeline" role="list" aria-label="Línea temporal de experiencia profesional">
    <article
      class="experience-card"
      role="listitem"
      *ngFor="let experience of experiences; let i = index; trackBy: trackByExperience"
      [class.is-active]="selectedIndex === i"
      (click)="select(i)"
      (keyup.enter)="select(i)"
      tabindex="0"
    >
      <div class="timeline-dot" aria-hidden="true"></div>

      <div class="card-head">
        <p class="date-pill">{{ experience.dateRange }}</p>
        <h3>{{ experience.role }}</h3>
        <p class="company">{{ experience.company }}</p>
      </div>

      <ul class="responsibilities">
        <li *ngFor="let responsibility of experience.responsibilities">{{ responsibility }}</li>
      </ul>

      <div class="stack" aria-label="Tecnologías utilizadas">
        <span class="stack-chip" *ngFor="let stack of experience.stackHighlights">{{ stack }}</span>
      </div>
    </article>
  </div>
</section>
