<section class="experience-wrap" aria-labelledby="experience-title">
  <header class="section-header">
    <p class="kicker">Historial profesional</p>
    <h2 id="experience-title">Experiencia profesional</h2>
    <p class="supporting">Trayectoria con foco en frontend corporativo, integración backend y calidad técnica.</p>
  </header>

  <mat-accordion class="timeline-accordion" multi="false">
    <mat-expansion-panel
      class="timeline-item"
      *ngFor="let experience of experiences; let i = index; trackBy: trackByExperience"
      [expanded]="selectedIndex === i"
      (opened)="select(i)"
      (closed)="clearSelection()"
    >
      <mat-expansion-panel-header>
        <div class="panel-heading">
          <div class="panel-main">
            <p class="company">{{ experience.company }}</p>
            <p class="role">{{ experience.role }}</p>
          </div>
          <p class="date">{{ experience.dateRange }}</p>
        </div>
      </mat-expansion-panel-header>

      <ul class="responsibilities">
        <li *ngFor="let responsibility of experience.responsibilities">{{ responsibility }}</li>
      </ul>

      <mat-chip-set aria-label="Stack técnico de la experiencia">
        <mat-chip *ngFor="let stack of experience.stackHighlights">{{ stack }}</mat-chip>
      </mat-chip-set>
    </mat-expansion-panel>
  </mat-accordion>
</section>
