<section aria-labelledby="experience-title">
  <h2 id="experience-title">Experiencia profesional</h2>

  <mat-accordion>
    <mat-expansion-panel
      *ngFor="let experience of experiences; let i = index; trackBy: trackByExperience"
      [expanded]="selectedIndex === i"
      (opened)="select(i)"
      (closed)="clearSelection()"
    >
      <mat-expansion-panel-header>
        <mat-panel-title>{{ experience.company }}</mat-panel-title>
        <mat-panel-description>{{ experience.role }} · {{ experience.dateRange }}</mat-panel-description>
      </mat-expansion-panel-header>

      <ul>
        <li *ngFor="let responsibility of experience.responsibilities">{{ responsibility }}</li>
      </ul>

      <mat-chip-set aria-label="Stack técnico de la experiencia">
        <mat-chip *ngFor="let stack of experience.stackHighlights">{{ stack }}</mat-chip>
      </mat-chip-set>
    </mat-expansion-panel>
  </mat-accordion>
</section>
