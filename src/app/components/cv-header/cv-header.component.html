<mat-card class="cv-hero" appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ name }}</mat-card-title>
    <mat-card-subtitle>{{ mainRole }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <p>{{ professionalSummary }}</p>

    <div class="contact-grid" aria-label="Información de contacto">
      <p><strong>Dirección:</strong> {{ contact.address }}</p>
      <p><strong>Móvil:</strong> {{ contact.mobilePhone }}</p>
      <p><strong>Fijo:</strong> {{ contact.landlinePhone }}</p>
      <p><strong>Correo:</strong> <a [href]="'mailto:' + contact.email">{{ contact.email }}</a></p>
      <p><strong>Fecha de nacimiento:</strong> {{ contact.birthDate }}</p>
      <p><strong>Nacionalidad:</strong> {{ contact.nationality }}</p>
    </div>
  </mat-card-content>
</mat-card>
