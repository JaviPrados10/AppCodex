<section aria-labelledby="experience-title" class="section-block" id="experiencia">
  <h2 id="experience-title">Experiencia profesional</h2>

  <mat-accordion class="experience-accordion" multi>
    <mat-expansion-panel *ngFor="let item of experiences; let i = index" [expanded]="i === 0">
      <mat-expansion-panel-header>
        <mat-panel-title>{{ item.company }}</mat-panel-title>
        <mat-panel-description>{{ item.role }} · {{ item.dateRange }}</mat-panel-description>
      </mat-expansion-panel-header>

      <ul>
        <li *ngFor="let responsibility of item.responsibilities">{{ responsibility }}</li>
      </ul>

      <div class="stack-group" aria-label="Stack destacado">
        <mat-chip-set>
          <mat-chip *ngFor="let stack of item.stackHighlights">{{ stack }}</mat-chip>
        </mat-chip-set>
      </div>
    </mat-expansion-panel>
  </mat-accordion>
</section>
