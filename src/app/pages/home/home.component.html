<section class="home-wrapper">
  <nav class="section-nav" aria-label="Navegación del CV">
    <a mat-stroked-button href="#experiencia">Experiencia</a>
    <a mat-stroked-button href="#formacion">Formación</a>
    <a mat-stroked-button href="#competencias">Competencias</a>
    <a mat-stroked-button href="#idiomas">Idiomas</a>
    <a mat-stroked-button href="#otros">Otros datos</a>
  </nav>

  <app-cv-header
    [name]="cvData.name"
    [mainRole]="cvData.mainRole"
    [professionalSummary]="cvData.professionalSummary"
    [contact]="cvData.contact"
  ></app-cv-header>

  <app-experience-list [experiences]="cvData.experience"></app-experience-list>
  <app-education-section [educationItems]="cvData.education"></app-education-section>
  <app-skills-section [skills]="cvData.technicalSkills"></app-skills-section>
  <app-languages-section [languages]="cvData.languages"></app-languages-section>
  <app-certifications-section
    [courses]="cvData.courses"
    [otherDetails]="cvData.otherDetails"
  ></app-certifications-section>
</section>
